<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מפת שטח משודרגת</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("portrait").catch(() => {});
            }
        });
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        @media screen and (orientation: landscape) {
            body {
                transform: rotate(90deg);
                transform-origin: center;
                width: 100vh;
                height: 100vw;
            }
        }

        #map { width: 100%; height: 100%; }

        /* ---------------------------------------------------------
           מסגרת עליונה — עיצוב חדש
        --------------------------------------------------------- */
        #top-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 90px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        #top-main {
            font-size: 14px;   /* קטן יותר */
            font-weight: bold;
        }

        #top-sub {
            font-size: 16px;   /* גדול יותר */
            font-weight: bold;
            margin-top: 4px;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---------------------------------------------------------
           עיגולים בצד שמאל
        --------------------------------------------------------- */
        .circle-box {
            position: absolute;
            left: 10px;
            width: 85px;
            height: 85px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            border: 3px solid #0078ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        #bearing-box { top: 25vh; border-color: #aa00aa; }
        #speed-box  { top: 40vh; border-color: #ff8800; }
        #altitude-box { top: 55vh; border-color: #0078ff; }

        #compass { font-size: 48px; margin-bottom: 4px; }

        /* ---------------------------------------------------------
           כפתורים בתחתית
        --------------------------------------------------------- */
        #bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }

        .dash-btn {
            background: #0078ff;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            flex: 1;
            margin: 0 4px;
        }

        .dash-btn.active {
            background: #001a44 !important;
            border: 2px solid #000;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
        }

        #scale-box {
            position: absolute;
            bottom: 80px;
            left: 10px;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #444;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        /* ---------------------------------------------------------
           חץ מיקום — יציב, ללא הבהובים
        --------------------------------------------------------- */
        .arrow-wrapper {
            width: 50px;
            height: 50px;
            transform-origin: center;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="top-main">כיוון: —° | מהירות: 0 קמ״ש | גובה: — מ׳</div>
    <div id="top-sub">כתובת: —</div>
</div>

<div id="bearing-box" class="circle-box">
    <div id="compass">🧭</div>
    <span id="bearing-value">—°</span>
</div>

<div id="speed-box" class="circle-box">
    <span id="speed-value">0</span>
    קמ״ש
</div>

<div id="altitude-box" class="circle-box">
    <span id="altitude-value">—</span>
    מ'
</div>

<div id="scale-box">—</div>

<div id="bottom-bar">
    <button id="track-start-btn" class="dash-btn">▶ התחל מסלול</button>
    <button id="track-stop-btn" class="dash-btn">⏹ סיים מסלול</button>
    <button id="contour-btn" class="dash-btn">⛰ קווי גובה</button>
    <button id="beep-btn" class="dash-btn">🔔 צפצוף גובה</button>
    <button id="locate-btn" class="dash-btn">📍 מצא אותי</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ---------------------------------------------------------
   צליל לחיצה
--------------------------------------------------------- */
let clickCtx = null;

function clickSound() {
    if (!clickCtx) clickCtx = new AudioContext();
    const osc = clickCtx.createOscillator();
    const gain = clickCtx.createGain();
    osc.frequency.value = 500;
    gain.gain.value = 0.2;
    osc.connect(gain);
    gain.connect(clickCtx.destination);
    osc.start();
    osc.stop(clickCtx.currentTime + 0.07);
}

document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".dash-btn").forEach(btn => {
        btn.addEventListener("click", clickSound);
    });
});

/* ---------------------------------------------------------
   משתנים גלובליים
--------------------------------------------------------- */
let beepEnabled = false;
let followMe = false;
let lastAltitudeBand = null;

let tracking = false;
let trackPoints = [];
let trackLine = null;

let pinMarker = null;

/* ---------------------------------------------------------
   מפה
--------------------------------------------------------- */
const map = L.map('map').setView([31.8, 34.9], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

const contourLayer = L.tileLayer(
    'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    { maxZoom: 17, opacity: 0.7 }
);

let contoursVisible = false;

/* ---------------------------------------------------------
   חץ מיקום — יציב
--------------------------------------------------------- */
const arrowIcon = L.divIcon({
    html: `
        <div class="arrow-wrapper">
            <svg width="50" height="50" viewBox="0 0 100 100">
                <polygon points="50,5 90,95 50,75 10,95"
                         fill="#0078ff"
                         stroke="black"
                         stroke-width="6"/>
            </svg>
        </div>
    `,
    className: "",
    iconSize: [50, 50],
    iconAnchor: [25, 25]
});

let arrowMarker = null;
let lastHeading = 0;

/* ---------------------------------------------------------
   פונקציות עזר
--------------------------------------------------------- */
async function reverseGeocode(lat, lng) {
    try {
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=he`;
        const res = await fetch(url);
        const data = await res.json();
        return data.display_name || "לא נמצאה כתובת";
    } catch {
        return "שגיאה בקבלת כתובת";
    }
}

async function getAltitude(lat, lng) {
    try {
        const url = `https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lng}`;
        const res = await fetch(url);
        const data = await res.json();
        return data.elevation ? Math.round(data.elevation) : null;
    } catch {
        return null;
    }
}

function updateScale() {
    const fullWidth = map.getSize().x;
    const p1 = map.containerPointToLatLng([0, map.getSize().y / 2]);
    const p2 = map.containerPointToLatLng([fullWidth, map.getSize().y / 2]);
    const dist = map.distance(p1, p2);
    document.getElementById("scale-box").textContent =
        dist < 1000 ? `${Math.round(dist)} מ'` : `${(dist / 1000).toFixed(2)} ק״מ`;
}

/* ---------------------------------------------------------
   כפתורים
--------------------------------------------------------- */
document.getElementById("contour-btn").onclick = () => {
    contoursVisible = !contoursVisible;
    if (contoursVisible) {
        contourLayer.addTo(map);
        contourBtn.classList.add("active");
    } else {
        map.removeLayer(contourLayer);
        contourBtn.classList.remove("active");
    }
};

document.getElementById("beep-btn").onclick = () => {
    beepEnabled = !beepEnabled;
    if (beepEnabled) beepBtn.classList.add("active");
    else beepBtn.classList.remove("active");
};

document.getElementById("locate-btn").onclick = () => {
    followMe = !followMe;
    if (followMe) locateBtn.classList.add("active");
    else locateBtn.classList.remove("active");
};

/* ---------------------------------------------------------
   לחיצה על המפה — סימון + כתובת
--------------------------------------------------------- */
map.on("click", async (e) => {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    if (pinMarker) map.removeLayer(pinMarker);

    pinMarker = L.marker([lat, lng]).addTo(map);

    const address = await reverseGeocode(lat, lng);
    document.getElementById("top-sub").textContent = `כתובת: ${address}`;
});

/* ---------------------------------------------------------
   מיקום — watchPosition + חץ יציב
--------------------------------------------------------- */
navigator.geolocation.watchPosition(showPosition, () => {}, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 5000
});

async function showPosition(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const speed = pos.coords.speed;
    const bearing = pos.coords.heading;

    document.getElementById("top-main").textContent =
        `כיוון: ${bearing ? Math.round(bearing) : "—"}° | ` +
        `מהירות: ${speed ? Math.round(speed * 3.6) : 0} קמ״ש | ` +
        `גובה: — מ׳`;

    const address = await reverseGeocode(lat, lng);
    document.getElementById("top-sub").textContent = `כתובת: ${address}`;

    const altitude = await getAltitude(lat, lng);
    document.getElementById("altitude-value").textContent =
        altitude !== null ? altitude : "—";

    document.getElementById("speed-value").textContent =
        speed ? Math.round(speed * 3.6) : 0;

    /* חץ יציב */
    if (!arrowMarker) {
        arrowMarker = L.marker([lat, lng], { icon: arrowIcon }).addTo(map);
    } else {
        arrowMarker.setLatLng([lat, lng]);
    }

    const arrowDiv = arrowMarker.getElement().querySelector(".arrow-wrapper");

    if (bearing !== null) {
        lastHeading = bearing;
    }

    arrowDiv.style.transform = `rotate(${lastHeading}deg)`;

    if (followMe) {
        map.setView([lat, lng], 16);
    }

    /* מסלול */
    if (tracking && altitude !== null) {
        trackPoints.push({ lat, lng, alt: altitude });
        if (trackLine) map.removeLayer(trackLine);
        trackLine = L.polyline(trackPoints.map(p => [p.lat, p.lng]), { color: "red" }).addTo(map);
    }
}

/* ---------------------------------------------------------
   מצפן — DeviceOrientation
--------------------------------------------------------- */
if (window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", (event) => {
        if (event.alpha !== null && arrowMarker) {
            lastHeading = 360 - event.alpha;
            const arrowDiv = arrowMarker.getElement().querySelector(".arrow-wrapper");
            arrowDiv.style.transform = `rotate(${lastHeading}deg)`;
        }
    });
}

/* ---------------------------------------------------------
   קנה מידה
--------------------------------------------------------- */
map.on("move", updateScale);
updateScale();

</script>

</body>
</html>
