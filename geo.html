<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מפת שטח משודרגת</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ניסיון לנעול את המסך למצב אנכי -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("portrait").catch(() => {});
            }
        });
    </script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* fallback: אם המכשיר מסתובב — מסובבים חזרה */
        @media screen and (orientation: landscape) {
            body {
                transform: rotate(90deg);
                transform-origin: center;
                width: 100vh;
                height: 100vw;
            }
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* ---------------------------------------------------------
           שורת מידע עליונה — שקופה‑למחצה, מרכזית
        --------------------------------------------------------- */
        #top-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 90px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        #top-main {
            font-size: 21px;
            font-weight: bold;
        }

        #top-sub {
            font-size: 10px;          /* מוקטן */
            margin-top: 4px;
            max-width: 90%;           /* מונע גלישה */
            white-space: nowrap;      /* שורה אחת */
            overflow: hidden;         /* מסתיר גלישה */
            text-overflow: ellipsis;  /* ... בסוף */
        }

        /* ---------------------------------------------------------
           עיגולים בצד שמאל — ממוקמים מחדש
        --------------------------------------------------------- */
        .circle-box {
            position: absolute;
            left: 10px;
            width: 85px;
            height: 85px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            border: 3px solid #0078ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        #bearing-box { top: 25vh; border-color: #aa00aa; }
        #speed-box  { top: 40vh; border-color: #ff8800; }
        #altitude-box { top: 55vh; border-color: #0078ff; }

        #compass {
            font-size: 48px;
            margin-bottom: 4px;
        }

        /* ---------------------------------------------------------
           דשבורד כפתורים בתחתית — ריווח תקין
        --------------------------------------------------------- */
        #bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }

        .dash-btn {
            background: #0078ff;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            flex: 1;
            margin: 0 4px;
        }

        /* כפתור פעיל — כהה וברור */
        .dash-btn.active {
            background: #001a44 !important;
            border: 2px solid #000;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
        }

        /* קנה מידה */
        #scale-box {
            position: absolute;
            bottom: 80px;
            left: 10px;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #444;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

<!-- ---------------------------------------------------------
     שורת מידע עליונה
--------------------------------------------------------- -->
<div id="top-bar">
    <div id="top-main">כיוון: —° | מהירות: 0 קמ״ש | גובה: — מ׳</div>
    <div id="top-sub">כתובת: —</div>
</div>

<!-- ---------------------------------------------------------
     עיגולים בצד שמאל
--------------------------------------------------------- -->
<div id="bearing-box" class="circle-box">
    <div id="compass">🧭</div>
    <span id="bearing-value">—°</span>
</div>

<div id="speed-box" class="circle-box">
    <span id="speed-value">0</span>
    קמ״ש
</div>

<div id="altitude-box" class="circle-box">
    <span id="altitude-value">—</span>
    מ'
</div>

<!-- קנה מידה -->
<div id="scale-box">—</div>

<!-- ---------------------------------------------------------
     דשבורד כפתורים בתחתית
--------------------------------------------------------- -->
<div id="bottom-bar">
    <button id="track-start-btn" class="dash-btn">▶ התחל מסלול</button>
    <button id="track-stop-btn" class="dash-btn">⏹ סיים מסלול</button>
    <button id="contour-btn" class="dash-btn">⛰ קווי גובה</button>
    <button id="beep-btn" class="dash-btn">🔔 צפצוף גובה</button>
    <button id="locate-btn" class="dash-btn">📍 מצא אותי</button>
</div>

<!-- מפה -->
<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ---------------------------------------------------------
   אפקט קולי ללחיצה על כפתורים
--------------------------------------------------------- */
let clickCtx = null;

function clickSound() {
    if (!clickCtx) clickCtx = new AudioContext();

    const osc = clickCtx.createOscillator();
    const gain = clickCtx.createGain();

    osc.frequency.value = 500;
    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(clickCtx.destination);

    osc.start();
    osc.stop(clickCtx.currentTime + 0.07);
}

document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".dash-btn").forEach(btn => {
        btn.addEventListener("click", clickSound);
    });
});

/* ---------------------------------------------------------
   משתנים גלובליים
--------------------------------------------------------- */
let beepEnabled = false;
let lastAltitudeBand = null;

let tracking = false;
let trackPoints = [];
let trackLine = null;

/* ---------------------------------------------------------
   יצירת מפה
--------------------------------------------------------- */
const map = L.map('map').setView([31.8, 34.9], 13);

const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

const contourLayer = L.tileLayer(
    'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    { maxZoom: 17, opacity: 0.7 }
);

let contoursVisible = false;

/* ---------------------------------------------------------
   פונקציות עזר
--------------------------------------------------------- */
function beep() {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    osc.frequency.value = 880;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}

async function reverseGeocode(lat, lng) {
    try {
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=he`;
        const res = await fetch(url);
        const data = await res.json();
        return data.display_name || "לא נמצאה כתובת";
    } catch {
        return "שגיאה בקבלת כתובת";
    }
}

async function getAltitude(lat, lng) {
    try {
        const url = `https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lng}`;
        const res = await fetch(url);
        const data = await res.json();
        return data.elevation ? Math.round(data.elevation) : null;
    } catch {
        return null;
    }
}

function updateScale() {
    const fullWidth = map.getSize().x;
    const p1 = map.containerPointToLatLng([0, map.getSize().y / 2]);
    const p2 = map.containerPointToLatLng([fullWidth, map.getSize().y / 2]);
    const dist = map.distance(p1, p2);

    document.getElementById("scale-box").textContent =
        dist < 1000 ? `${Math.round(dist)} מ'` : `${(dist / 1000).toFixed(2)} ק״מ`;
}

function distance3D(lat1, lng1, alt1, lat2, lng2, alt2) {
    const d2d = map.distance([lat1, lng1], [lat2, lng2]);
    const dAlt = alt2 - alt1;
    return Math.sqrt(d2d * d2d + dAlt * dAlt);
}

/* ---------------------------------------------------------
   כפתורים
--------------------------------------------------------- */
const contourBtn = document.getElementById("contour-btn");
const beepBtn = document.getElementById("beep-btn");

contourBtn.onclick = () => {
    contoursVisible = !contoursVisible;

    if (contoursVisible) {
        contourLayer.addTo(map);
        contourBtn.classList.add("active");
    } else {
        map.removeLayer(contourLayer);
        contourBtn.classList.remove("active");
    }
};

beepBtn.onclick = () => {
    beepEnabled = !beepEnabled;

    if (beepEnabled) beepBtn.classList.add("active");
    else beepBtn.classList.remove("active");
};

document.getElementById("track-start-btn").onclick = () => {
    tracking = true;
    trackPoints = [];
    if (trackLine) map.removeLayer(trackLine);
};

document.getElementById("track-stop-btn").onclick = () => {
    tracking = false;

    if (trackPoints.length < 2) {
        alert("אין מספיק נתונים למסלול");
        return;
    }

    let flatDist = 0;
    let realDist = 0;

    for (let i = 1; i < trackPoints.length; i++) {
        const p1 = trackPoints[i - 1];
        const p2 = trackPoints[i];

        flatDist += map.distance([p1.lat, p1.lng], [p2.lat, p2.lng]);
        realDist += distance3D(p1.lat, p1.lng, p1.alt, p2.lat, p2.lng, p2.alt);
    }

    alert(
        "אורך מסלול שטוח: " + (flatDist / 1000).toFixed(3) + " ק\"מ\n" +
        "אורך מסלול אמיתי (כולל שיפועים): " + (realDist / 1000).toFixed(3) + " ק\"מ"
    );
};

document.getElementById("locate-btn").onclick = locate;

/* ---------------------------------------------------------
   מיקום — עכשיו עם watchPosition
--------------------------------------------------------- */
async function showPosition(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const speed = pos.coords.speed;
    const bearing = pos.coords.heading;

    /* עדכון שורת מידע עליונה */
    document.getElementById("top-main").textContent =
        `כיוון: ${bearing ? Math.round(bearing) : "—"}° | ` +
        `מהירות: ${speed ? Math.round(speed * 3.6) : 0} קמ״ש | ` +
        `גובה: — מ׳`;

    /* כתובת */
    const address = await reverseGeocode(lat, lng);
    document.getElementById("top-sub").textContent = `כתובת: ${address}`;

    /* גובה */
    const altitude = await getAltitude(lat, lng);
    document.getElementById("altitude-value").textContent =
        altitude !== null ? altitude : "—";

    /* מהירות */
    document.getElementById("speed-value").textContent =
        speed ? Math.round(speed * 3.6) : 0;

    /* כיוון */
    if (bearing !== null) {
        document.getElementById("bearing-value").textContent = Math.round(bearing) + "°";
        document.getElementById("compass").style.transform = `rotate(${bearing}deg)`;
    }

    /* צפצוף חציית קו גובה */
    if (altitude !== null) {
        const band = Math.floor(altitude / 10);
        if (lastAltitudeBand !== null && band !== lastAltitudeBand && beepEnabled) {
            beep();
        }
        lastAltitudeBand = band;
    }

    /* מסלול */
    if (tracking && altitude !== null) {
        trackPoints.push({ lat, lng, alt: altitude });

        if (trackLine) map.removeLayer(trackLine);
        trackLine = L.polyline(trackPoints.map(p => [p.lat, p.lng]), { color: "red" }).addTo(map);
    }

    map.setView([lat, lng], 16);
}

function locate() {
    navigator.geolocation.watchPosition(showPosition, () => {}, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 5000
    });
}

locate();

/* ---------------------------------------------------------
   מצפן — DeviceOrientation
--------------------------------------------------------- */
if (window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", (event) => {
        if (event.alpha !== null) {
            const heading = 360 - event.alpha;
            document.getElementById("compass").style.transform = `rotate(${heading}deg)`;
        }
    });
}

/* ---------------------------------------------------------
   קנה מידה
--------------------------------------------------------- */
map.on("move", updateScale);
updateScale();

</script>

</body>
</html>
