<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מפת שטח משודרגת</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ספריית Leaflet -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* תיבות מידע */
        .info-box {
            position: absolute;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #0078ff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            font-size: 13px;
            line-height: 1.4;
        }

        #status { top: 10px; }
        #address { top: 70px; max-width: 240px; }
        #clicked-address { top: 140px; max-width: 240px; }

        /* כפתורים */
        .round-btn {
            position: absolute;
            right: 20px;
            z-index: 1000;
            background: #0078ff;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        #locate-btn { bottom: 20px; }
        #contour-btn { bottom: 70px; background: #00aa55; }
        #beep-btn { bottom: 120px; background: #cc6600; }
        #track-start-btn { bottom: 170px; background: #4444cc; }
        #track-stop-btn { bottom: 220px; background: #aa0000; }

        /* עיגולים קטנים יותר */
        .circle-box {
            position: absolute;
            left: 10px;
            width: 85px;
            height: 85px;
            background: white;
            border-radius: 50%;
            border: 3px solid #0078ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* מיקום העיגולים */
        #altitude-box { bottom: 20px; }
        #speed-box { bottom: 120px; border-color: #ff8800; }
        #bearing-box { bottom: 220px; border-color: #aa00aa; }

        /* המצפן עצמו — גדול יותר */
        #compass {
            font-size: 48px;
            margin-bottom: 4px;
        }

        /* קנה מידה */
        #scale-box {
            position: absolute;
            bottom: 20px;
            left: 120px;
            background: white;
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #444;
            font-size: 13px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<!-- תיבות מידע -->
<div id="status" class="info-box">מאתר מיקום…</div>
<div id="address" class="info-box">כתובת: —</div>
<div id="clicked-address" class="info-box">כתובת נקודה: —</div>

<!-- כפתורים -->
<button id="locate-btn" class="round-btn">📍 מצא אותי</button>
<button id="contour-btn" class="round-btn">⛰ קווי גובה</button>
<button id="beep-btn" class="round-btn">🔔 צפצוף גובה</button>
<button id="track-start-btn" class="round-btn">▶ התחל מסלול</button>
<button id="track-stop-btn" class="round-btn">⏹ סיים מסלול</button>

<!-- עיגולים -->
<div id="altitude-box" class="circle-box">
    <span id="altitude-value">—</span>
    מ'
</div>

<div id="speed-box" class="circle-box">
    <span id="speed-value">0</span>
    קמ״ש
</div>

<div id="bearing-box" class="circle-box">
    <div id="compass">🧭</div>
    <span id="bearing-value">—°</span>
</div>

<!-- קנה מידה -->
<div id="scale-box">—</div>

<!-- מפה -->
<div id="map"></div>

<!-- ספריית Leaflet -->
<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="">
</script>

<script>
/* ---------------------------------------------------------
   משתנים גלובליים
--------------------------------------------------------- */

let beepEnabled = false;
let lastAltitudeBand = null;

let tracking = false;
let trackPoints = [];
let trackLine = null;

const statusBox = document.getElementById('status');
const addressBox = document.getElementById('address');
const clickedAddressBox = document.getElementById('clicked-address');
const altitudeValue = document.getElementById('altitude-value');
const speedValue = document.getElementById('speed-value');
const bearingValue = document.getElementById('bearing-value');
const scaleBox = document.getElementById('scale-box');

const locateBtn = document.getElementById('locate-btn');
const contourBtn = document.getElementById('contour-btn');
const beepBtn = document.getElementById('beep-btn');
const trackStartBtn = document.getElementById('track-start-btn');
const trackStopBtn = document.getElementById('track-stop-btn');

const compass = document.getElementById('compass');

/* ---------------------------------------------------------
   יצירת מפה
--------------------------------------------------------- */

const map = L.map('map').setView([31.8, 34.9], 13);

/* שכבת מפה רגילה */
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

/* שכבת קווי גובה */
const contourLayer = L.tileLayer(
    'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    { maxZoom: 17, opacity: 0.7 }
);

let contoursVisible = false;

/* ---------------------------------------------------------
   כפתור קווי גובה
--------------------------------------------------------- */
contourBtn.onclick = () => {
    if (contoursVisible) {
        map.removeLayer(contourLayer);
        contourBtn.style.background = "#00aa55";
    } else {
        contourLayer.addTo(map);
        contourBtn.style.background = "#008844";
    }
    contoursVisible = !contoursVisible;
};

/* ---------------------------------------------------------
   פונקציית צפצוף
--------------------------------------------------------- */
function beep() {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    osc.frequency.value = 880;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}

/* כפתור הפעלה/כיבוי צפצוף */
beepBtn.onclick = () => {
    beepEnabled = !beepEnabled;
    beepBtn.style.background = beepEnabled ? "#aa3300" : "#cc6600";
};

/* ---------------------------------------------------------
   Reverse Geocoding
--------------------------------------------------------- */
async function reverseGeocode(lat, lng) {
    try {
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=he`;
        const res = await fetch(url);
        const data = await res.json();
        return data.display_name || "לא נמצאה כתובת";
    } catch {
        return "שגיאה בקבלת כתובת";
    }
}

/* ---------------------------------------------------------
   גובה
--------------------------------------------------------- */
async function getAltitude(lat, lng) {
    try {
        const url = `https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lng}`;
        const res = await fetch(url);
        const data = await res.json();
        return data.elevation ? Math.round(data.elevation) : null;
    } catch {
        return null;
    }
}

/* ---------------------------------------------------------
   קנה מידה — רוחב מסך מלא
--------------------------------------------------------- */
function updateScale() {
    const fullWidth = map.getSize().x;
    const p1 = map.containerPointToLatLng([0, map.getSize().y / 2]);
    const p2 = map.containerPointToLatLng([fullWidth, map.getSize().y / 2]);
    const dist = map.distance(p1, p2);

    scaleBox.textContent = dist < 1000
        ? `${Math.round(dist)} מ'`
        : `${(dist / 1000).toFixed(2)} ק״מ`;
}

/* ---------------------------------------------------------
   חישוב מרחק 3D (כולל שיפועים)
--------------------------------------------------------- */
function distance3D(lat1, lng1, alt1, lat2, lng2, alt2) {
    const d2d = map.distance([lat1, lng1], [lat2, lng2]);
    const dAlt = alt2 - alt1;
    return Math.sqrt(d2d * d2d + dAlt * dAlt);
}

/* ---------------------------------------------------------
   התחלת מסלול
--------------------------------------------------------- */
trackStartBtn.onclick = () => {
    tracking = true;
    trackPoints = [];
    if (trackLine) map.removeLayer(trackLine);
    trackLine = null;
    trackStartBtn.style.background = "#2222aa";
};

/* ---------------------------------------------------------
   סיום מסלול
--------------------------------------------------------- */
trackStopBtn.onclick = () => {
    tracking = false;
    trackStartBtn.style.background = "#4444cc";

    if (trackPoints.length < 2) {
        alert("אין מספיק נתונים למסלול");
        return;
    }

    let flatDist = 0;
    let realDist = 0;

    for (let i = 1; i < trackPoints.length; i++) {
        const p1 = trackPoints[i - 1];
        const p2 = trackPoints[i];

        flatDist += map.distance([p1.lat, p1.lng], [p2.lat, p2.lng]);
        realDist += distance3D(p1.lat, p1.lng, p1.alt, p2.lat, p2.lng, p2.alt);
    }

    alert(
        "אורך מסלול שטוח: " + (flatDist / 1000).toFixed(3) + " ק\"מ\n" +
        "אורך מסלול אמיתי (כולל שיפועים): " + (realDist / 1000).toFixed(3) + " ק\"מ"
    );
};

/* ---------------------------------------------------------
   הצגת מיקום
--------------------------------------------------------- */
async function showPosition(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const speed = pos.coords.speed;
    const bearing = pos.coords.heading;

    statusBox.textContent = `מיקום: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    /* כתובת */
    const address = await reverseGeocode(lat, lng);
    addressBox.textContent = "כתובת: " + address;

    /* גובה */
    const altitude = await getAltitude(lat, lng);
    altitudeValue.textContent = altitude !== null ? altitude : "—";

    /* מהירות */
    speedValue.textContent = speed ? Math.round(speed * 3.6) : 0;

    /* כיוון תנועה */
    if (bearing !== null) {
        bearingValue.textContent = Math.round(bearing) + "°";
        compass.style.transform = `rotate(${bearing}deg)`;
    }

    /* צפצוף חציית קו גובה */
    if (altitude !== null) {
        const band = Math.floor(altitude / 10);
        if (lastAltitudeBand !== null && band !== lastAltitudeBand && beepEnabled) {
            beep();
        }
        lastAltitudeBand = band;
    }

    /* מסלול */
    if (tracking && altitude !== null) {
        trackPoints.push({ lat, lng, alt: altitude });

        if (trackLine) map.removeLayer(trackLine);
        trackLine = L.polyline(trackPoints.map(p => [p.lat, p.lng]), { color: "red" }).addTo(map);
    }

    map.setView([lat, lng], 16);
}

/* ---------------------------------------------------------
   טעינת מיקום
--------------------------------------------------------- */
function locate() {
    statusBox.textContent = "מאתר מיקום…";
    navigator.geolocation.getCurrentPosition(showPosition, err => {
        statusBox.textContent = "שגיאה: " + err.message;
    }, { enableHighAccuracy: true });
}

locateBtn.onclick = locate;
locate();

/* ---------------------------------------------------------
   מצפן — DeviceOrientation
--------------------------------------------------------- */
if (window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", (event) => {
        if (event.alpha !== null) {
            const heading = 360 - event.alpha;
            compass.style.transform = `rotate(${heading}deg)`;
        }
    });
}

/* ---------------------------------------------------------
   לחיצה על המפה — נקודה ננעצת
--------------------------------------------------------- */
let clickedMarker = null;

map.on("click", async (e) => {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    if (clickedMarker) map.removeLayer(clickedMarker);

    clickedMarker = L.marker([lat, lng]).addTo(map);

    clickedAddressBox.textContent = "טוען כתובת…";

    const address = await reverseGeocode(lat, lng);
    clickedAddressBox.textContent = "כתובת נקודה: " + address;

    const altitude = await getAltitude(lat, lng);
    altitudeValue.textContent = altitude !== null ? altitude : "—";
});

/* ---------------------------------------------------------
   קנה מידה
--------------------------------------------------------- */
map.on("move", updateScale);
updateScale();

</script>

</body>
</html>
